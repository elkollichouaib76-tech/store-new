<script>

let currentCategory = "all";
let selectedProduct = "";
let selectedPrice = 0;
const deliveryPrice = 600;
let selectedDesc = "";
let selectedImage = "";

/* =======================
   PRODUCTS DATA
======================= */

const products = [
{
name:"Smart Watch",
category:"electronics",
price:3500,
description:"ساعة ذكية بشاشة لمس، قياس نبضات القلب، وإشعارات الهاتف.",
image:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500"
},
{
name:"Headphones",
category:"electronics",
price:4500,
description:"سماعات لاسلكية بصوت عالي الجودة وبطارية قوية.",
image:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500"
},
{
name:"Blender",
category:"home",
price:5500,
description:"خلاط قوي لتحضير العصائر بسرعة وسهولة.",
image:"https://images.unsplash.com/photo-1570222094114-d054a817e56b?w=500"
},
{
name:"Gaming Mouse",
category:"electronics",
price:2800,
description:"فأرة ألعاب سريعة الاستجابة بإضاءة RGB وتصميم مريح.",
image:"https://images.unsplash.com/photo-1527814050087-3793815479db?w=500"
},
{
name:"Keyboard RGB",
category:"electronics",
price:4200,
description:"لوحة مفاتيح ميكانيكية بإضاءة ملونة وتجربة كتابة احترافية.",
image:"https://images.unsplash.com/photo-1511467687858-23d96c32e4ae?w=500"
},
{
name:"Air Fryer",
category:"home",
price:12500,
description:"قلاية هوائية لتحضير طعام صحي بدون زيت وبسرعة عالية.",
image:"https://images.unsplash.com/photo-1604908554027-1c6e2a9f7a18?w=500"
},
{
name:"Smart TV 43",
category:"electronics",
price:65000,
description:"تلفاز ذكي بدقة عالية مع دعم يوتيوب ونتفليكس.",
image:"https://images.unsplash.com/photo-1593359677879-a4bb92f829d1?w=500"
},
{
name:"Perfume Luxury",
category:"beauty",
price:3500,
description:"عطر رجالي برائحة قوية وثبات طويل.",
image:"https://images.unsplash.com/photo-1594035910387-fea47794261f?w=500"
},
];
  
function updateTotalPrice(){

let qty = parseInt(document.getElementById("qty").value) || 1;

let productTotal = selectedPrice * qty;
let total = productTotal + deliveryPrice;

document.getElementById("productPriceDisplay").innerText =
productTotal + " دج";

document.getElementById("totalPriceDisplay").innerText =
total + " دج";

}

/* =======================
   RENDER PRODUCTS
======================= */

function renderProducts(){

let box = document.getElementById("productsGrid");
let search = document.getElementById("searchInput").value.toLowerCase();

box.innerHTML = "";

products.forEach((p,index)=>{

if(
(currentCategory === "all" || p.category === currentCategory) &&
p.name.toLowerCase().includes(search)
){

box.innerHTML += `

<div class="product-card">

<img src="${p.image}"
onclick="openProduct(${index})">

<div class="product-info">

<div class="product-name">${p.name}</div>

<div class="product-price">${p.price} دج</div>

<button class="command-btn"
onclick="openOrder(${index})">
Commander
</button>

</div>

</div>

`;
}

});

}

/* =======================
   CATEGORY
======================= */

function setCategory(cat){
currentCategory = cat;
renderProducts();
}

/* =======================
   OPEN PRODUCT (ZOOM)
======================= */

function openProduct(index){

selectedProduct = products[index].name;
selectedPrice = products[index].price;
selectedDesc = products[index].description;
selectedImage = products[index].image;

document.getElementById("modalImage").src = selectedImage;
document.getElementById("modalName").innerText = selectedProduct;
document.getElementById("modalDesc").innerText = selectedDesc;
document.getElementById("modalPrice").innerText = selectedPrice + " دج";

/* زر Commander داخل نافذة المنتج */
document.getElementById("modalOrderBtn").onclick = function(){
openOrder(index);
closeProduct();
};
document.getElementById("qty").value = 1;
updateTotalPrice();
document.getElementById("productModal").style.display = "flex";
}

function closeProduct(){
document.getElementById("productModal").style.display = "none";
}

/* =======================
   ORDER MODAL
======================= */

function openOrder(index){

selectedProduct = products[index].name;
selectedPrice = products[index].price;
document.getElementById("productPriceDisplay").innerText =
selectedPrice + " دج";

document.getElementById("totalPriceDisplay").innerText =
(selectedPrice + deliveryPrice) + " دج";
document.getElementById("orderModal").style.display = "flex";
}

function closeOrder(){
document.getElementById("orderModal").style.display = "none";
}

/* =======================
   SEND TO WHATSAPP
======================= */

function sendOrder(){

let first = document.getElementById("firstName").value;
let last = document.getElementById("lastName").value;
let phone = document.getElementById("phone").value;
let wilaya = document.getElementById("wilayaInput").value;
let commune = document.getElementById("commune").value;
let address = document.getElementById("address").value;
let delivery = document.getElementById("delivery").value;
let qty = document.getElementById("qty").value;

let msg = `🛒 طلب جديد - DZ STORE

📦 المنتج: ${selectedProduct}
💰 السعر: ${selectedPrice} دج

👤 الاسم: ${first} ${last}
📞 الهاتف: ${phone}

🏙 الولاية: ${wilaya}
🏘 البلدية: ${commune}
📍 العنوان: ${address}

🚚 التوصيل: ${delivery}
🔢 الكمية: ${qty}
`;

window.open(
"https://wa.me/213775123025?text=" + encodeURIComponent(msg),
"_blank"
);

}

/* =======================
   INIT
======================= */

renderProducts();
const wilayas = ["أدرار","الشلف","الأغواط","أم البواقي","باتنة","بجاية","بسكرة","بشار","البليدة","البويرة","تمنراست","تبسة","تلمسان","تيارت","تيزي وزو","الجزائر","الجلفة","جيجل","سطيف","سعيدة","سكيكدة","سيدي بلعباس","عنابة","قالمة","قسنطينة","المدية","مستغانم","المسيلة","معسكر","ورقلة","وهران","البيض","إليزي","برج بوعريريج","بومرداس","الطارف","تندوف","تيسمسيلت","الوادي","خنشلة","سوق أهراس","تيبازة","ميلة","عين الدفلى","النعامة","عين تموشنت","غرداية","غليزان","المغير","المنيعة","أولاد جلال","برج باجي مختار","بني عباس","تقرت","جانت","عين صالح","عين قزام"];

function filterWilaya(){

let input = document.getElementById("wilayaInput").value.toLowerCase();
let list = document.getElementById("wilayaList");

list.innerHTML = "";

if(input === ""){
list.style.display = "none";
return;
}

let result = wilayas.filter(w =>
w.toLowerCase().includes(input)
);

result.forEach(w => {
list.innerHTML += `
<div onclick="selectWilaya('${w}')"
style="padding:8px;color:white;cursor:pointer">
${w}
</div>
`;
});

list.style.display = "block";
}

function selectWilaya(name){
document.getElementById("wilayaInput").value = name;
document.getElementById("wilayaList").style.display = "none";
  }
  
</script>
