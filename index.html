<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DZ STORE</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#f6f7fb;
    direction: rtl;
}

/* الهيدر */
header{
    background: linear-gradient(135deg,#000,#2b2b2b);
    color:white;
    text-align:center;
    padding:25px;
    font-size:28px;
    font-weight:bold;
    letter-spacing:1px;
}

/* المنتجات */
.container{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(230px,1fr));
    gap:18px;
    padding:20px;
}

.card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:190px;
    object-fit:cover;
}

.card-body{
    padding:12px;
}

.title{
    font-size:18px;
    font-weight:bold;
}

.desc{
    font-size:13px;
    color:#555;
    margin:5px 0;
}

.price{
    color:#1aa34a;
    font-weight:bold;
    margin:5px 0;
}

.buy{
    width:100%;
    padding:12px;
    border:none;
    background:#111;
    color:white;
    cursor:pointer;
    font-size:15px;
    border-radius:0 0 15px 15px;
}

.buy:hover{
    background:#333;
}

/* الفورم */
#overlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}

form{
    background:white;
    padding:18px;
    border-radius:12px;
    width:330px;
}

input, select{
    width:100%;
    padding:9px;
    margin:6px 0;
    border:1px solid #ddd;
    border-radius:5px;
}

.btn{
    width:100%;
    padding:10px;
    border:none;
    color:white;
    background:#1aa34a;
    cursor:pointer;
    margin-top:5px;
}

.close{
    background:red;
}

small{
    color:#666;
}
</style>
</head>

<body>

<header>🛒 DZ STORE</header>

<!-- 🟢 المنتجات -->
<div class="container">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">
        <div class="card-body">
            <div class="title">ساعة يد فاخرة</div>
            <div class="desc">ساعة أنيقة بجودة عالية ومقاومة للماء</div>
            <div class="price">6000 دج</div>
        </div>
        <button class="buy" onclick="openOrder('ساعة يد فاخرة',6000)">شراء الآن</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1606813907291-d86efa9b94db">
        <div class="card-body">
            <div class="title">حذاء رياضي</div>
            <div class="desc">مريح للجري والمشي اليومي</div>
            <div class="price">4500 دج</div>
        </div>
        <button class="buy" onclick="openOrder('حذاء رياضي',4500)">شراء الآن</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f">
        <div class="card-body">
            <div class="title">سماعات بلوتوث</div>
            <div class="desc">صوت نقي وبطارية قوية</div>
            <div class="price">3000 دج</div>
        </div>
        <button class="buy" onclick="openOrder('سماعات بلوتوث',3000)">شراء الآن</button>
    </div>

</div>

<!-- 🟡 الفورم -->
<div id="overlay">
<form onsubmit="sendOrder(event)">

<h3 id="productTitle">طلب المنتج</h3>
<small>أكمل بياناتك لإتمام الطلب</small>

<input id="name" placeholder="الاسم الكامل" required>
<input id="phone" placeholder="رقم الهاتف" required>

<select id="wilaya" onchange="loadCities()" required>
<option value="">اختر الولاية</option>
</select>

<select id="city" required>
<option value="">اختر البلدية</option>
</select>

<input id="address" placeholder="العنوان الكامل" required>

<select id="delivery">
<option>توصيل إلى المنزل</option>
<option>استلام من المكتب</option>
</select>

<button class="btn" type="submit">تأكيد الطلب عبر WhatsApp</button>
<button class="btn close" type="button" onclick="closeOrder()">إغلاق</button>

</form>
</div>

<script>

let productName = "";
let productPrice = 0;

/* فتح الطلب */
function openOrder(name, price){
    productName = name;
    productPrice = price;

    document.getElementById("productTitle").innerText =
    "طلب: " + name + " - " + price + " دج";

    document.getElementById("overlay").style.display = "flex";
}

/* إغلاق */
function closeOrder(){
    document.getElementById("overlay").style.display = "none";
}

/* إرسال واتساب */
function sendOrder(e){
    e.preventDefault();

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let wilaya = document.getElementById("wilaya").value;
    let city = document.getElementById("city").value;
    let address = document.getElementById("address").value;
    let delivery = document.getElementById("delivery").value;

    let msg =
`🛒 طلب جديد DZ STORE
📦 المنتج: ${productName}
💰 السعر: ${productPrice} دج
👤 الاسم: ${name}
📞 الهاتف: ${phone}
🏙 الولاية: ${wilaya}
🏘 البلدية: ${city}
📍 العنوان: ${address}
🚚 التوصيل: ${delivery}`;

    let number = "213XXXXXXXXX"; // 🔴 ضع رقمك هنا

    window.open("https://wa.me/" + number + "?text=" + encodeURIComponent(msg), "_blank");

    closeOrder();
}

/* الولايات */
const wilayas = ["أدرار","الشلف","الأغواط","أم البواقي","باتنة","بجاية","بسكرة","بشار","البليدة","البويرة","تمنراست","تبسة","تلمسان","تيارت","تيزي وزو","الجزائر","الجلفة","جيجل","سطيف","سعيدة","سكيكدة","سيدي بلعباس","عنابة","قالمة","قسنطينة","المدية","مستغانم","المسيلة","معسكر","ورقلة","وهران","البيض","إليزي","برج بوعريريج","بومرداس","الطارف","تندوف","تيسمسيلت","الوادي","خنشلة","سوق أهراس","تيبازة","ميلة","عين الدفلى","النعامة","عين تيموشنت","غرداية","غليزان"];

/* بلديات (نموذج قابل للتوسيع) */
const cities = {
"بسكرة":["بسكرة","طولقة","أورلال","فوغالة"],
"الجزائر":["الجزائر الوسطى","باب الزوار","باب الوادي","الحراش"],
"وهران":["وهران","السانية","قديل"]
};

/* تحميل */
let w = document.getElementById("wilaya");
wilayas.forEach(x=>{
    let o = document.createElement("option");
    o.textContent = x;
    w.appendChild(o);
});

/* البلديات */
function loadCities(){
    let w = document.getElementById("wilaya").value;
    let c = document.getElementById("city");

    c.innerHTML = "<option>اختر البلدية</option>";

    if(cities[w]){
        cities[w].forEach(v=>{
            let o = document.createElement("option");
            o.textContent = v;
            c.appendChild(o);
        });
    }
}

</script>

</body>
</html>
