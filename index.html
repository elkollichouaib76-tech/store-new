<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DZ STORE</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f6fa;
direction:rtl;
}

header{
background:linear-gradient(135deg,#000,#333);
color:white;
text-align:center;
padding:22px;
font-size:26px;
font-weight:bold;
}

/* المنتجات */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{
padding:10px;
}

.price{
color:green;
font-weight:bold;
}

/* الفورم */
#overlay{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

form{
background:white;
padding:15px;
border-radius:10px;
width:340px;
}

input,select{
width:100%;
padding:8px;
margin:5px 0;
border:1px solid #ddd;
border-radius:6px;
}

.btn{
width:100%;
padding:10px;
border:none;
color:white;
background:#1aa34a;
cursor:pointer;
}

.close{
background:red;
}

/* صفحة المنتج */
#productPage{
display:none;
padding:20px;
}

video{
width:100%;
border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<header>🛒 DZ STORE</header>

<!-- المنتجات -->
<div class="container" id="products"></div>

<!-- صفحة منتج -->
<div id="productPage">
<button onclick="back()">⬅ رجوع</button>
<div id="productBox"></div>
</div>

<!-- الفورم -->
<div id="overlay">
<form onsubmit="sendOrder(event)">

<h3 id="title">طلب المنتج</h3>

<input id="name" placeholder="الاسم الكامل" required>
<input id="phone" placeholder="رقم الهاتف" required>

<select id="wilaya" required>
<option value="">اختر الولاية</option>
</select>

<input id="city" placeholder="اكتب البلدية" required>

<input id="address" placeholder="العنوان الكامل" required>

<select id="delivery">
<option>توصيل للمنزل</option>
<option>استلام من المكتب</option>
</select>

<button class="btn" type="submit">تأكيد عبر WhatsApp</button>
<button class="btn close" type="button" onclick="closeOrder()">إغلاق</button>

</form>
</div>

<script>

let productName="";
let productPrice=0;
let productImg="";
let productVideo="";

/* منتجات جاهزة */
let products=[
{
id:1,
name:"ساعة يد فاخرة",
desc:"ساعة أنيقة وعصرية",
price:6000,
img:"https://images.unsplash.com/photo-1523275335684-37898b6baf30",
video:""
},
{
id:2,
name:"حذاء رياضي",
desc:"مريح للجري والمشي",
price:4500,
img:"https://images.unsplash.com/photo-1606813907291-d86efa9b94db",
video:""
}
];

/* عرض المنتجات */
function render(){
let box=document.getElementById("products");
box.innerHTML="";

products.forEach(p=>{
box.innerHTML+=`
<div class="card" onclick="openProduct(${p.id})">
<img src="${p.img}">
<div class="card-body">
<h3>${p.name}</h3>
<p>${p.desc}</p>
<div class="price">${p.price} دج</div>
</div>
</div>
`;
});
}
render();

/* فتح منتج */
function openProduct(id){
let p=products.find(x=>x.id==id);

productName=p.name;
productPrice=p.price;
productImg=p.img;
productVideo=p.video;

document.getElementById("productPage").style.display="block";
document.getElementById("products").style.display="none";

document.getElementById("productBox").innerHTML=`
<h2>${p.name}</h2>
<img src="${p.img}" style="width:100%;border-radius:10px">
<p>${p.desc}</p>
<h3>${p.price} دج</h3>

${p.video ? `<video controls src="${p.video}"></video>` : ""}

<button onclick="openOrder()">🛒 طلب المنتج (Commander)</button>
`;
}

/* رجوع */
function back(){
document.getElementById("productPage").style.display="none";
document.getElementById("products").style.display="grid";
}

/* فتح الطلب */
function openOrder(){
document.getElementById("overlay").style.display="flex";
}

/* إغلاق */
function closeOrder(){
document.getElementById("overlay").style.display="none";
}

/* إرسال WhatsApp */
function sendOrder(e){
e.preventDefault();

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let wilaya=document.getElementById("wilaya").value;
let city=document.getElementById("city").value;
let address=document.getElementById("address").value;
let delivery=document.getElementById("delivery").value;

let msg=
`🛒 طلب جديد DZ STORE
📦 المنتج: ${productName}
💰 السعر: ${productPrice} دج
👤 الاسم: ${name}
📞 الهاتف: ${phone}
🏙 الولاية: ${wilaya}
🏘 البلدية: ${city}
📍 العنوان: ${address}
🚚 التوصيل: ${delivery}`;

let number="213775123025";

window.open("https://wa.me/"+number+"?text="+encodeURIComponent(msg),"_blank");

closeOrder();
}

/* الولايات */
const wilayas=[
"أدرار","الشلف","الأغواط","أم البواقي","باتنة","بجاية","بسكرة","بشار",
"البليدة","البويرة","تمنراست","تبسة","تلمسان","تيارت","تيزي وزو","الجزائر",
"الجلفة","جيجل","سطيف","سعيدة","سكيكدة","سيدي بلعباس","عنابة","قالمة",
"قسنطينة","المدية","مستغانم","المسيلة","معسكر","ورقلة","وهران","البيض",
"إليزي","برج بوعريريج","بومرداس","الطارف","تندوف","تيسمسيلت","الوادي",
"خنشلة","سوق أهراس","تيبازة","ميلة","عين الدفلى","النعامة","عين تيموشنت",
"غرداية","غليزان"
];

/* تحميل الولايات */
let w=document.getElementById("wilaya");

wilayas.forEach(x=>{
let o=document.createElement("option");
o.textContent=x;
w.appendChild(o);
});

</script>

</body>
</html>
