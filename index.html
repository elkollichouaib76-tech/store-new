<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DZ STORE PREMIUM</title>

<style>
body{
margin:0;
background:#0b0b0b;
color:#fff;
font-family:Arial,sans-serif;
}

.hero{
padding:30px;
text-align:center;
background:linear-gradient(180deg,#000,#161616);
}

.logo{
font-size:34px;
font-weight:bold;
color:#00ff88;
}

.tag{
margin-top:10px;
color:#ccc;
}

.product{
max-width:900px;
margin:auto;
padding:20px;
}

.main-img{
width:100%;
height:380px;
object-fit:cover;
border-radius:15px;
cursor:pointer;
}

.gallery{
display:flex;
gap:10px;
margin-top:10px;
overflow:auto;
}

.gallery img{
width:100px;
height:100px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
transition:.3s;
}

.gallery img:hover{
transform:scale(1.08);
}

.price-old{
text-decoration:line-through;
color:#888;
font-size:20px;
}

.price-new{
font-size:38px;
color:#00ff88;
font-weight:bold;
}

.badge{
background:red;
padding:8px 12px;
border-radius:8px;
display:inline-block;
margin-top:10px;
}

.rating{
color:gold;
font-size:20px;
margin:10px 0;
}

.timer{
background:#111;
padding:15px;
border-radius:10px;
margin:15px 0;
text-align:center;
font-size:24px;
}

.features{
background:#111;
padding:15px;
border-radius:10px;
line-height:2;
}

form{
background:#111;
padding:20px;
border-radius:15px;
margin-top:20px;
}

input,select{
width:100%;
padding:12px;
margin:6px 0;
background:#1b1b1b;
color:#fff;
border:none;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
background:#00ff88;
border:none;
font-weight:bold;
border-radius:8px;
cursor:pointer;
font-size:18px;
}

button:hover{
opacity:.9;
}

.total{
font-size:22px;
color:#00ff88;
text-align:center;
margin:10px 0;
}

video{
width:100%;
border-radius:15px;
margin-top:15px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.95);
justify-content:center;
align-items:center;
z-index:9999;
}

.modal img{
max-width:95%;
max-height:95%;
border-radius:15px;
}
</style>

</head>
<body>

<div class="hero">
<div class="logo">DZ STORE</div>
<div class="tag">الدفع عند الاستلام | توصيل لجميع الولايات</div>
</div>

<div class="product">

<img id="mainImage"
class="main-img"
onclick="openImage()"
src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">

<div class="gallery">

<img onclick="changeImage(this.src)"
src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">

<img onclick="changeImage(this.src)"
src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">

<img onclick="changeImage(this.src)"
src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e">

</div>

<h1>المنتج المميز</h1>

<div class="rating">
⭐⭐⭐⭐⭐ 4.9/5
</div>

<div class="price-old">
5000 دج
</div>

<div class="price-new">
3500 دج
</div>

<div class="badge">
🔥 تخفيض 30%
</div>

<div class="timer" id="timer"></div>

<div class="features">
✅ جودة ممتازة<br>
✅ الدفع عند الاستلام<br>
✅ توصيل سريع 58 ولاية<br>
✅ ضمان الاستبدال عند وجود عيب
</div>

<video controls>
<source src="" type="video/mp4">
</video>

<form onsubmit="sendOrder(event)">

<input id="name"
placeholder="الاسم الكامل"
required>

<input id="phone"
placeholder="رقم الهاتف"
required>

<select id="wilaya" required>
<option value="">اختر الولاية</option>
</select>

<input id="city"
placeholder="البلدية"
required>

<input id="address"
placeholder="العنوان الكامل"
required>

<input id="qty"
type="number"
value="1"
min="1"
oninput="calc()">

<div class="total" id="total">
المجموع: 3500 دج
</div>

<button type="submit">
🛒 اطلب الآن عبر WhatsApp
</button>

</form>

</div>

<div id="imageModal" class="modal" onclick="closeImage()">
<img id="modalImg">
</div>

<script>

function changeImage(src){
document.getElementById("mainImage").src = src;
}

function openImage(){
document.getElementById("imageModal").style.display = "flex";
document.getElementById("modalImg").src =
document.getElementById("mainImage").src;
}

function closeImage(){
document.getElementById("imageModal").style.display = "none";
}

const price = 3500;

function calc(){
document.getElementById("total").innerHTML =
'المجموع: ' + (qty.value * price) + ' دج';
}

function sendOrder(e){

e.preventDefault();

let msg = `🛒 طلب جديد - DZ STORE

📦 المنتج: المنتج المميز
💰 سعر الوحدة: ${price} دج
🔢 الكمية: ${qty.value}
💵 المجموع: ${qty.value*price} دج

👤 الاسم: ${name.value}
📞 الهاتف: ${phone.value}
🏙 الولاية: ${wilaya.value}
🏘 البلدية: ${city.value}
📍 العنوان: ${address.value}`;

window.open(
'https://wa.me/213775123025?text=' +
encodeURIComponent(msg),
'_blank'
);

}

const wilayas = [
"أدرار","الشلف","الأغواط","أم البواقي","باتنة","بجاية",
"بسكرة","بشار","البليدة","البويرة","تمنراست","تبسة",
"تلمسان","تيارت","تيزي وزو","الجزائر","الجلفة","جيجل",
"سطيف","سعيدة","سكيكدة","سيدي بلعباس","عنابة","قالمة",
"قسنطينة","المدية","مستغانم","المسيلة","معسكر","ورقلة",
"وهران","البيض","إليزي","برج بوعريريج","بومرداس",
"الطارف","تندوف","تيسمسيلت","الوادي","خنشلة",
"سوق أهراس","تيبازة","ميلة","عين الدفلى","النعامة",
"عين تيموشنت","غرداية","غليزان"
];

wilayas.forEach(w=>{
let o=document.createElement("option");
o.textContent=w;
wilaya.appendChild(o);
});

let time = 18000;

setInterval(()=>{

let h=Math.floor(time/3600);
let m=Math.floor((time%3600)/60);
let s=time%60;

timer.innerHTML =
'⏰ العرض ينتهي خلال ' +
String(h).padStart(2,'0') + ':' +
String(m).padStart(2,'0') + ':' +
String(s).padStart(2,'0');

if(time>0) time--;

},1000);

</script>

</body>
</html>
