<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DZ STORE Premium</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f0f0f;
color:#fff;
}

header{
background:#000;
padding:20px;
text-align:center;
border-bottom:2px solid #00c853;
}

header h1{
color:#00e676;
font-size:32px;
}

.hero{
padding:60px 20px;
text-align:center;
background:linear-gradient(135deg,#000,#1a1a1a);
}

.hero h2{
font-size:36px;
margin-bottom:15px;
}

.hero p{
font-size:18px;
color:#ccc;
margin-bottom:20px;
}

.btn{
display:inline-block;
padding:12px 25px;
background:#00c853;
color:#fff;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

.products{
padding:40px 20px;
}

.section-title{
text-align:center;
margin-bottom:30px;
font-size:28px;
color:#00e676;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#1a1a1a;
border-radius:12px;
overflow:hidden;
box-shadow:0 0 10px rgba(0,0,0,.4);
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card-content{
padding:15px;
text-align:center;
}

.price{
color:#00e676;
font-size:22px;
margin:10px 0;
font-weight:bold;
}

.order-btn{
display:inline-block;
background:#25D366;
padding:10px 20px;
border-radius:8px;
text-decoration:none;
color:white;
font-weight:bold;
}

.contact{
padding:50px 20px;
background:#111;
}

.contact form{
max-width:500px;
margin:auto;
display:flex;
flex-direction:column;
gap:15px;
}

.contact input,
.contact textarea{
padding:12px;
border:none;
border-radius:8px;
}

.contact button{
padding:12px;
background:#00c853;
border:none;
border-radius:8px;
color:white;
font-size:18px;
cursor:pointer;
}

footer{
text-align:center;
padding:20px;
background:#000;
margin-top:30px;
color:#aaa;
}
</style>

</head>
<body>

<header>
<h1>DZ STORE Premium</h1>
</header>

<section class="hero">
<h2>أفضل المنتجات بأفضل الأسعار</h2>
<p>توصيل سريع إلى جميع ولايات الجزائر</p>
<a href="#products" class="btn">تسوق الآن</a>
</section>

<section class="products" id="products">

<h2 class="section-title">منتجاتنا</h2>

<div class="grid">

<div class="card">
<img src="https://via.placeholder.com/400x300" alt="منتج">
<div class="card-content">
<h3>المنتج الأول</h3>
<p class="price">3500 دج</p>
<a class="order-btn" href="https://wa.me/213000000000?text=أريد طلب المنتج الأول">
اطلب الآن
</a>
</div>
</div>

<div class="card">
<img src="https://via.placeholder.com/400x300" alt="منتج">
<div class="card-content">
<h3>المنتج الثاني</h3>
<p class="price">4500 دج</p>
<a class="order-btn" href="https://wa.me/213000000000?text=أريد طلب المنتج الثاني">
اطلب الآن
</a>
</div>
</div>

<div class="card">
<img src="https://via.placeholder.com/400x300" alt="منتج">
<div class="card-content">
<h3>المنتج الثالث</h3>
<p class="price">5500 دج</p>
<a class="order-btn" href="https://wa.me/213000000000?text=أريد طلب المنتج الثالث">
اطلب الآن
</a>
</div>
</div>

</div>

</section>

<section class="contact">

<h2 class="section-title">اتصل بنا</h2>

<form>
<input type="text" placeholder="الاسم الكامل" required>
<input type="tel" placeholder="رقم الهاتف" required>
<textarea rows="5" placeholder="رسالتك"></textarea>
<button type="submit">إرسال</button>
</form>

</section>

<footer>
© 2026 DZ STORE Premium - جميع الحقوق محفوظة
</footer>

</body>
</html>
