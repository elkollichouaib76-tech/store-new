<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DZ STORE PRO MAX ULTRA</title>

<style>
body{margin:0;font-family:Arial;background:#0b0b0b;color:#fff}

header{
background:#000;
padding:15px;
text-align:center;
border-bottom:2px solid #00e676;
position:sticky;top:0;
}

.logo{color:#00e676;font-size:26px;font-weight:bold}

.container{max-width:1100px;margin:auto;padding:20px}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.card{background:#181818;border-radius:12px;overflow:hidden}

.card img{width:100%;height:180px;object-fit:cover}

.info{padding:10px}

.price{color:#00e676;font-weight:bold}

button{
background:#25D366;
border:none;
padding:10px;
width:100%;
color:white;
cursor:pointer;
border-radius:8px;
}

.small-btn{
background:#333;
padding:6px;
margin-top:5px;
}

.cart-btn{
position:fixed;
bottom:15px;
left:15px;
background:#00e676;
color:#000;
padding:12px 18px;
border-radius:30px;
font-weight:bold;
cursor:pointer;
}

.panel{
position:fixed;
top:0;
right:-420px;
width:350px;
height:100%;
background:#111;
padding:15px;
overflow:auto;
transition:0.3s;
}

.panel.active{right:0}

.item{
background:#222;
padding:8px;
margin:5px 0;
border-radius:8px;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
}

.admin{
background:#1a1a1a;
padding:10px;
margin-top:10px;
border-radius:10px;
border:1px solid #00e676;
}

.login{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

.hidden{display:none}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
<h2>🔐 Admin Login</h2>
<input id="pass" type="password" placeholder="كلمة السر">
<button onclick="login()">دخول</button>
</div>

<header>
<div class="logo">👑 DZ STORE ULTRA</div>
</header>

<div class="container">

<h2>🛍 المنتجات</h2>
<div id="products" class="products"></div>

<hr>

<div id="adminPanel" class="hidden">

<h2>⚙️ لوحة الإدارة</h2>

<div class="admin">

<input id="pname" placeholder="اسم المنتج">
<input id="pprice" placeholder="السعر">
<input id="pimg" placeholder="رابط الصورة">

<button onclick="addProduct()">➕ إضافة منتج</button>

</div>

<h3>📦 الطلبات</h3>
<div id="orders"></div>

</div>

</div>

<!-- CART -->
<div class="cart-btn" onclick="toggleCart()">
🛒 السلة (<span id="count">0</span>)
</div>

<div class="panel" id="cartPanel">

<h3>🛒 السلة</h3>
<div id="cartItems"></div>

<hr>

<input id="name" placeholder="الاسم">
<input id="phone" placeholder="الهاتف">

<select id="wilaya">
<option>سطيف</option>
<option>الجزائر</option>
<option>وهران</option>
<option>قسنطينة</option>
<option>باتنة</option>
</select>

<button onclick="sendOrder()">إرسال الطلب</button>

</div>

<script>

/* ======================
   AUTH
====================== */

function login(){
let pass = document.getElementById("pass").value;
if(pass==="admin123"){
document.getElementById("login").style.display="none";
document.getElementById("adminPanel").classList.remove("hidden");
}else{
alert("كلمة السر خطأ");
}
}

/* ======================
   DATA
====================== */

let products = JSON.parse(localStorage.getItem("products")) || [
{name:"Smart Watch",price:3500,img:"https://picsum.photos/400/300?1"},
{name:"Headphones",price:5500,img:"https://picsum.photos/400/300?2"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let orders = JSON.parse(localStorage.getItem("orders")) || [];

/* ======================
   PRODUCTS
====================== */

function renderProducts(){

let box = document.getElementById("products");
box.innerHTML="";

products.forEach((p,i)=>{

box.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div class="info">
<h3>${p.name}</h3>
<p class="price">${p.price} دج</p>
<button onclick="addToCart(${i})">أضف للسلة</button>
<button class="small-btn" onclick="deleteProduct(${i})">حذف</button>
</div>
</div>
`;

});

}

/* ======================
   ADD PRODUCT
====================== */

function addProduct(){

let name=document.getElementById("pname").value;
let price=document.getElementById("pprice").value;
let img=document.getElementById("pimg").value;

products.push({name,price,img});
localStorage.setItem("products",JSON.stringify(products));

renderProducts();

}

/* ======================
   DELETE PRODUCT
====================== */

function deleteProduct(i){
products.splice(i,1);
localStorage.setItem("products",JSON.stringify(products));
renderProducts();
}

/* ======================
   CART
====================== */

function addToCart(i){
cart.push(products[i]);
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
}

function renderCart(){

document.getElementById("count").innerText=cart.length;

let box=document.getElementById("cartItems");
box.innerHTML="";

cart.forEach(c=>{
box.innerHTML+=`
<div class="item">${c.name} - ${c.price} دج</div>
`;
});

}

/* ======================
   CART PANEL
====================== */

function toggleCart(){
document.getElementById("cartPanel").classList.toggle("active");
}

/* ======================
   ORDER SYSTEM
====================== */

function sendOrder(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let wilaya=document.getElementById("wilaya").value;

let items=cart.map(p=>p.name).join(", ");
let total=cart.reduce((a,b)=>a+Number(b.price),0);

let order={
name,phone,wilaya,items,total,date:new Date().toLocaleString()
};

orders.push(order);
localStorage.setItem("orders",JSON.stringify(orders));

localStorage.setItem("cart",JSON.stringify([]));
cart=[];

renderCart();
renderOrders();

let msg=
`🛒 طلب جديد - DZ STORE ULTRA

👤 الاسم: ${name}
📞 الهاتف: ${phone}
🏙 الولاية: ${wilaya}

📦 المنتجات: ${items}
💰 المجموع: ${total} دج`;

window.open("https://wa.me/213775123025?text="+encodeURIComponent(msg));

}

/* ======================
   ORDERS DASHBOARD
====================== */

function renderOrders(){

let box=document.getElementById("orders");
if(!box) return;

box.innerHTML="";

orders.forEach((o,i)=>{

box.innerHTML+=`
<div class="item">
<b>#${i+1}</b><br>
${o.name} - ${o.phone}<br>
${o.wilaya}<br>
${o.items}<br>
💰 ${o.total} دج<br>
🕒 ${o.date}
</div>
`;

});

}

renderProducts();
renderCart();
renderOrders();

</script>

</body>
</html>
