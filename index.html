<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👑 DZ STORE</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0b0b0b;
color:white;
}

/* HEADER */
header{
position:sticky;
top:0;
z-index:1000;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(10px);
padding:15px;
border-bottom:1px solid #00ff88;
}

/* LOGO */
.logo-wrapper{
text-align:center;
position:relative;
display:inline-block;
margin:auto;
width:100%;
}

.glow{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90px;
height:90px;
background:#00ff88;
filter:blur(35px);
opacity:0.25;
border-radius:50%;
animation:pulse 2.5s infinite;
}

.crown{
font-size:42px;
position:relative;
z-index:2;
animation:float 2.5s ease-in-out infinite;
text-shadow:0 0 15px #00ff88;
}

.store{
font-size:28px;
font-weight:bold;
color:#00ff88;
letter-spacing:4px;
position:relative;
z-index:2;
text-shadow:0 0 15px rgba(0,255,136,0.6);
transition:0.3s;
}

.logo-wrapper:hover .store{
color:#ffd700;
text-shadow:0 0 15px rgba(255,215,0,0.7);
}

/* HERO */
.hero{
height:100vh;
background:
linear-gradient(120deg,rgba(0,0,0,0.75),rgba(0,0,0,0.4)),
url("https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?auto=format&fit=crop&w=1600&q=80");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero h1{
font-size:55px;
margin-bottom:10px;
}

.hero p{
color:#ddd;
font-size:18px;
margin-bottom:20px;
}

.btn{
display:inline-block;
padding:14px 30px;
background:linear-gradient(135deg,#00ff88,#00c853);
color:black;
font-weight:bold;
border-radius:12px;
text-decoration:none;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* PRODUCTS */
.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:#151515;
border-radius:15px;
overflow:hidden;
transition:0.3s;
border:1px solid #222;
}

.card:hover{
transform:translateY(-8px);
border-color:#00ff88;
}

.card img{
width:100%;
height:230px;
object-fit:cover;
cursor:pointer;
transition:0.3s;
}

.card img:hover{
transform:scale(1.05);
}

.info{
padding:15px;
}

.price{
color:#00ff88;
font-size:20px;
font-weight:bold;
margin:10px 0;
}

.btn-order{
display:block;
text-align:center;
padding:12px;
background:#25D366;
color:white;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
z-index:9999;
}

.modal img{
max-width:90%;
max-height:90%;
}

/* ANIMATIONS */
@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-7px);}
100%{transform:translateY(0);}
}

@keyframes pulse{
0%{transform:translate(-50%,-50%) scale(1);}
50%{transform:translate(-50%,-50%) scale(1.2);}
100%{transform:translate(-50%,-50%) scale(1);}
}

</style>

</head>

<body>

<header>
<div class="logo-wrapper">
<div class="glow"></div>
<div class="crown">👑</div>
<div class="store">DZ STORE</div>
</div>
</header>

<section class="hero">
<div>
<h1>أفضل متجر في الجزائر</h1>
<p>توصيل لجميع الولايات + دفع عند الاستلام</p>
<a href="#products" class="btn">ابدأ التسوق</a>
</div>
</section>

<div class="container">

<h2>🔥 المنتجات</h2>

<div class="products">

<!-- PRODUCT 1 -->
<div class="card">
<img src="images/watch.jpg" onclick="openImg(this.src)">
<div class="info">
<h3>Smart Watch</h3>
<div class="price">3500 دج</div>
<a class="btn-order" href="#" onclick="order('Smart Watch',3500)">Commander</a>
</div>
</div>

<!-- PRODUCT 2 -->
<div class="card">
<img src="images/headphones.jpg" onclick="openImg(this.src)">
<div class="info">
<h3>Headphones</h3>
<div class="price">4500 دج</div>
<a class="btn-order" href="#" onclick="order('Headphones',4500)">Commander</a>
</div>
</div>

<!-- PRODUCT 3 -->
<div class="card">
<img src="images/blender.jpg" onclick="openImg(this.src)">
<div class="info">
<h3>Mini Blender</h3>
<div class="price">5500 دج</div>
<a class="btn-order" href="#" onclick="order('Mini Blender',5500)">Commander</a>
</div>
</div>

</div>
</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="closeImg()">
<img id="modalImg">
</div>

<script>

function openImg(src){
document.getElementById("modal").style.display="flex";
document.getElementById("modalImg").src=src;
}

function closeImg(){
document.getElementById("modal").style.display="none";
}

function order(name,price){

let phone="213775123025";

let msg=
"🛒 طلب جديد - DZ STORE\n\n"+
"📦 المنتج: "+name+"\n"+
"💰 السعر: "+price+" دج\n\n"+
"👤 الاسم: \n"+
"📞 الهاتف: \n"+
"🏙 الولاية: \n"+
"📍 العنوان: \n";

let url=
"https://wa.me/"+phone+"?text="+encodeURIComponent(msg);

window.open(url,"_blank");

}

</script>

</body>
</html>
