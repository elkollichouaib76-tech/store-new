<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجري الإلكتروني</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f4f4f4;
    direction: rtl;
}

header{
    background:#111;
    color:white;
    padding:15px;
    text-align:center;
}

.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    margin:20px;
}

.product{
    background:white;
    width:250px;
    margin:10px;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
    overflow:hidden;
}

.product img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.product h3{
    margin:10px;
}

.product p{
    margin:10px;
    color:#555;
}

.price{
    color:green;
    font-weight:bold;
    margin:10px;
}

button{
    background:#111;
    color:white;
    border:none;
    width:100%;
    padding:10px;
    cursor:pointer;
}

button:hover{
    background:#333;
}

/* الفورم */
#formBox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
}

form{
    background:white;
    padding:20px;
    border-radius:10px;
    width:300px;
}

form input{
    width:100%;
    margin:5px 0;
    padding:8px;
}

.close{
    background:red;
}
</style>

</head>

<body>

<header>
    <h1>🛒 متجري الإلكتروني</h1>
</header>

<div class="container">

    <!-- منتج 1 -->
    <div class="product">
        <img src="https://via.placeholder.com/300" />
        <h3>منتج 1</h3>
        <p>وصف بسيط للمنتج</p>
        <div class="price">2000 دج</div>
        <button onclick="openForm('منتج 1')">شراء الآن</button>
    </div>

    <!-- منتج 2 -->
    <div class="product">
        <img src="https://via.placeholder.com/300" />
        <h3>منتج 2</h3>
        <p>وصف بسيط للمنتج</p>
        <div class="price">3500 دج</div>
        <button onclick="openForm('منتج 2')">شراء الآن</button>
    </div>

</div>

<!-- الفورم -->
<div id="formBox">
    <form onsubmit="sendOrder(event)">
        <h3 id="productName">طلب المنتج</h3>

        <input type="text" placeholder="الاسم الكامل" required>
        <input type="text" placeholder="رقم الهاتف" required>
        <input type="text" placeholder="الولاية" required>
        <input type="text" placeholder="البلدية" required>
        <input type="text" placeholder="العنوان" required>

        <button type="submit">تأكيد الطلب</button>
        <button type="button" class="close" onclick="closeForm()">إغلاق</button>
    </form>
</div>

<script>
let selectedProduct = "";

function openForm(product){
    selectedProduct = product;
    document.getElementById("productName").innerText = "طلب: " + product;
    document.getElementById("formBox").style.display = "flex";
}

function closeForm(){
    document.getElementById("formBox").style.display = "none";
}

function sendOrder(event){
    event.preventDefault();

    alert("تم إرسال الطلب بنجاح 👍");

    document.getElementById("formBox").style.display = "none";
}
</script>

</body>
</html>
